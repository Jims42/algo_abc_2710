<!DOCTYPE html>
<html lang="fr-FR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire d'inscription</title>
</head>
<body>
    <h1>Formulaire d'inscription</h1>
    <h2>Votre compte cpnfiguré en 2 minutes !</h2>

    <form action="formulaire.html" method="GET"  enctype="text/plain"> 
    <legend>État Civil</legend>

    <div class="form-group">
      <label for="nom">Nom :</label>
      <input type="text" id="nom" name="user_nom" required>
    </div>

    <div class="form-group">
      <label for="prenom">Prénom :</label>
      <input type="text" id="prenom" name="user_prenom" required>
    </div>

    <div class="form-group">
      <label for="date_naissance">Date de naissance :</label>
      <input type="date" id="date_naissance" name="user_date_naissance">
    </div>
  </fieldset>
  <fieldset>
            <legend>Informations de contact</legend>
            <div>
                <label for="email">Email :</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div>
                <label for="tel">Téléphone :</label>
                <input type="tel" id="tel" name="tel" required>
            </div>
        </fieldset>

        <div>
            <input type="checkbox" id="conditions" name="conditions" required>
            <label for="conditions" style="width: auto;">
                J'accepte les <a href="conditions.html" target="_blank">conditions d'utilisation</a>
            </label>
        </div>

        <div>
            <input type="submit" value="S’inscrire">
        </div>

 
</form>

</body>
</html>
